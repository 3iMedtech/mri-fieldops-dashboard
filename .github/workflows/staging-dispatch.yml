name: Staging push → redeploy Pages from main

# The `github-pages` deployment environment is locked to the default branch
# (main). A workflow that runs on `staging` can build, but the final
# `actions/deploy-pages` step gets rejected. This tiny workflow lives on
# the staging branch and simply dispatches the `pages-deploy.yml` workflow
# on main — main then checks out both branches and publishes both paths.

on:
  push:
    branches: [staging]

permissions:
  actions: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Pages deploy on main
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'pages-deploy.yml',
              ref: 'main'
            });
